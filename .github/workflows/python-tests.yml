name: Python Unit Tests and Coverage

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install coverage pylint

    - name: Install Playwright Browsers and System Deps
      run: |
        python -m playwright install chromium --with-deps

    - name: Configure environment settings
      run: |
        cp src/config_sample.py src/config.py

    - name: Run unit tests with coverage
      env:
        PYTHONPATH: src
      run: |
        coverage run --source=src --omit=src/config_sample.py -m unittest discover -s tests -p "*_test.py" -t .
        coverage report -m

    - name: Run Pylint linter
      env:
        PYTHONPATH: src
      run: |
        pylint --ignore=config.py src/ tests/
